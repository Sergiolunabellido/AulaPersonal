<!--
  Componente Pomodoro - Configurador y temporizador de sesiones de estudio.

  ESTRUCTURA GENERAL:
  ┌──────────────────────────────────────────────────────────────────┐
  │  #pomodoro-app (flex row, centrado en pantalla)                 │
  │                                                                  │
  │  ┌─── IZQUIERDO (max-w-md) ──────────────┐                      │
  │  │                                         │                      │
  │  │  ┌── SESIÓN ──────────────────────────┐ │                      │
  │  │  │  · Tiempo de sesión (botones)      │ │                      │
  │  │  │  · Nº de sesiones (+/-)           │ │                      │
  │  │  └────────────────────────────────────┘ │                      │
  │  │                                         │                      │
  │  │  ┌── DESCANSO ────────────────────────┐ │                      │
  │  │  │  · Tiempo de descanso (botones)    │ │                      │
  │  │  │  · Descansos a realizar (auto)     │ │                      │
  │  │  └────────────────────────────────────┘ │                      │
  │  └─────────────────────────────────────────┘                      │
  │                                                                  │
  │  ┌─── DERECHO (max-w-md) ─────────────────┐                      │
  │  │                                         │                      │
  │  │  ┌── SESSION PREVIEW ─────────────────┐ │                      │
  │  │  │  · Resumen de la configuración     │ │                      │
  │  │  └────────────────────────────────────┘ │                      │
  │  │                                         │                      │
  │  │  ┌── TEMPORIZADOR ────────────────────┐ │                      │
  │  │  │  · Cuenta atrás grande             │ │                      │
  │  │  │  · Fase actual (sesión/descanso)   │ │                      │
  │  │  │  · Barra de progreso              │ │                      │
  │  │  │  · Botones: Iniciar / Pausa / Parar│ │                      │
  │  │  └────────────────────────────────────┘ │                      │
  │  └─────────────────────────────────────────┘                      │
  └──────────────────────────────────────────────────────────────────┘

  CICLO DE TEMPORIZACIÓN:
    IDLE ──[Iniciar]──> SESIÓN 1 ──[fin]──> DESCANSO 1 ──[fin]──> SESIÓN 2 ...
    ... ──[fin]──> COMPLETADO ──[Reiniciar]──> IDLE

    Los descansos ocurren SIEMPRE entre sesiones.
    Para N sesiones hay N-1 descansos (la última sesión no tiene descanso).
-->
<div id="pomodoro-app" class="flex justify-center items-center min-h-[calc(100vh-2rem)] gap-12 p-8">

  <!-- ============================================================
       LADO IZQUIERDO: Controles de configuración
       ============================================================ -->
  <div class="flex flex-col gap-8 w-full max-w-md">

    <!-- BLOQUE SESIÓN -->
    <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100" id="session-config-block">
      <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M5 13a7 7 0 1 0 14 0a7 7 0 0 0 -14 0" /><path d="M14.5 10.5l-2.5 2.5" /><path d="M17 8l1 -1" /><path d="M14 3h-4" /></svg>
        Sesión
      </h2>
      <div class="flex flex-col gap-4" id="session-controls">
        <div>
          <label class="text-sm text-gray-500 mb-2 block">Tiempo de sesión</label>
          <div class="flex flex-wrap gap-2" id="session-time-buttons">
            <button data-minutes="30"  class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-blue-400 hover:text-blue-600 transition-all duration-200">30 min</button>
            <button data-minutes="60"  class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-blue-400 hover:text-blue-600 transition-all duration-200">1 h</button>
            <button data-minutes="90"  class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-blue-400 hover:text-blue-600 transition-all duration-200">1 h 30 min</button>
            <button data-minutes="120" class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-blue-400 hover:text-blue-600 transition-all duration-200">2 h</button>
            <button data-minutes="150" class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-blue-400 hover:text-blue-600 transition-all duration-200">2 h 30 min</button>
            <button data-minutes="180" class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-blue-400 hover:text-blue-600 transition-all duration-200">3 h</button>
          </div>
        </div>
        <div>
          <label class="text-sm text-gray-500 mb-2 block">Número de sesiones</label>
          <div class="flex items-center gap-4">
            <button id="session-count-minus" class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:border-blue-400 hover:text-blue-600 transition-all duration-200 text-lg font-medium">−</button>
            <span id="session-count" class="text-2xl font-bold text-gray-800 min-w-[3rem] text-center">3</span>
            <button id="session-count-plus" class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:border-blue-400 hover:text-blue-600 transition-all duration-200 text-lg font-medium">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- BLOQUE DESCANSO -->
    <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100" id="break-config-block">
      <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-600"><path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" /><path d="M9 12h6" /><path d="M12 9v6" /></svg>
        Descanso
      </h2>
      <div class="flex flex-col gap-4" id="break-controls">
        <div>
          <label class="text-sm text-gray-500 mb-2 block">Tiempo de descanso</label>
          <div class="flex flex-wrap gap-2" id="break-time-buttons">
            <button data-minutes="5"  class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-green-400 hover:text-green-600 transition-all duration-200">5 min</button>
            <button data-minutes="10" class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-green-400 hover:text-green-600 transition-all duration-200">10 min</button>
            <button data-minutes="15" class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-green-400 hover:text-green-600 transition-all duration-200">15 min</button>
            <button data-minutes="20" class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-green-400 hover:text-green-600 transition-all duration-200">20 min</button>
            <button data-minutes="30" class="px-4 py-2 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:border-green-400 hover:text-green-600 transition-all duration-200">30 min</button>
          </div>
        </div>
        <div>
          <label class="text-sm text-gray-500 mb-2 block">Descansos a realizar</label>
          <span id="break-count" class="text-2xl font-bold text-gray-800 min-w-[3rem]">2</span>
          <span class="text-sm text-gray-400 ml-2">descansos</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       LADO DERECHO: Vista previa + Temporizador
       Mismo ancho que el lado izquierdo (max-w-md) para simetría.
       ============================================================ -->
  <div class="flex flex-col gap-8 w-full max-w-md">

    <!-- PANEL SESSION PREVIEW -->
    <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
      <h2 class="text-lg font-semibold text-gray-800 mb-6 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-600"><path d="M10 13a5 5 0 0 0 7.54 .54l3 -3a5 5 0 0 0 -7.07 -7.07l-3 3" /><path d="M14 11a5 5 0 0 0 -7.54 -.54l-3 3a5 5 0 0 0 7.07 7.07l3 -3" /></svg>
        Session Preview
      </h2>
      <div class="space-y-3">
        <div class="flex justify-between items-center py-2">
          <span class="text-gray-500 text-sm">Sesiones</span>
          <span class="text-gray-800 font-semibold" id="preview-sessions">3 sesiones de 1 h</span>
        </div>
        <div class="bg-gradient-to-r from-blue-50 to-purple-50 rounded-xl p-4">
          <div class="flex justify-between items-center">
            <span class="text-gray-600 text-sm">Total tiempo sesiones</span>
            <span class="text-xl font-bold text-blue-700" id="preview-total-hours">3 h</span>
          </div>
        </div>
        <div class="flex justify-between items-center py-1">
          <span class="text-gray-400 text-xs">en minutos</span>
          <span class="text-gray-500 text-sm font-medium" id="preview-total-minutes">180 min</span>
        </div>
        <hr class="border-gray-200 my-3">
        <div class="flex justify-between items-center py-2">
          <span class="text-gray-600 text-sm">Descanso por sesión</span>
          <span class="text-gray-800 font-semibold" id="preview-break-time">5 min</span>
        </div>
        <div class="flex justify-between items-center py-1">
          <span class="text-gray-400 text-xs">descansos totales</span>
          <span class="text-gray-500 text-sm font-medium" id="preview-total-breaks">2 descansos</span>
        </div>
      </div>
    </div>

    <!-- PANEL TEMPORIZADOR -->
    <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100" id="timer-panel">
      <div id="timer-idle">
        <button id="btn-start" class="w-full bg-blue-800 hover:bg-blue-600 text-white font-medium py-3 px-6 rounded-lg transition-all duration-300 flex items-center justify-center gap-2 text-base">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4l14 8l-14 8z" /></svg>
          Start Focus Session
        </button>
      </div>

      <div id="timer-active" class="hidden">
        <!-- Indicador de fase actual -->
        <div class="text-center mb-4">
          <span id="timer-phase-label" class="text-sm font-medium text-gray-500 uppercase tracking-wide">SESIÓN 1 de 3</span>
        </div>

        <!-- Cuenta atrás grande -->
        <div class="text-center mb-4">
          <span id="timer-countdown" class="text-5xl font-bold text-gray-800 font-mono tabular-nums">01:00:00</span>
        </div>

        <!-- Barra de progreso -->
        <div class="w-full bg-gray-100 rounded-full h-2.5 mb-6 overflow-hidden">
          <div id="timer-progress" class="bg-blue-600 h-2.5 rounded-full transition-all duration-700 ease-linear" style="width: 100%"></div>
        </div>

        <!-- Botones de control -->
        <div class="flex gap-3">
          <button id="btn-pause" class="flex-1 bg-yellow-500 hover:bg-yellow-400 text-white font-medium py-2.5 px-4 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zM14 4h4v16h-4z" /></svg>
            Pausa
          </button>
          <button id="btn-stop" class="flex-1 bg-red-500 hover:bg-red-400 text-white font-medium py-2.5 px-4 rounded-lg transition-all duration-200 flex items-center justify-center gap-2 text-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z" /></svg>
            Detener
          </button>
        </div>
      </div>

      <div id="timer-completed" class="hidden text-center">
        <div class="text-4xl mb-2">🎉</div>
        <p class="text-lg font-semibold text-gray-800 mb-1">¡Sesiones completadas!</p>
        <p class="text-sm text-gray-500 mb-4">Has completado todas las sesiones de estudio.</p>
        <button id="btn-reset" class="bg-blue-800 hover:bg-blue-600 text-white font-medium py-2.5 px-6 rounded-lg transition-all duration-200">
          Nueva sesión
        </button>
      </div>
    </div>

  </div>
</div>

<script src="./Pomodoro/pomodoro.js"></script>
