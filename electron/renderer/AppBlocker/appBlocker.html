<div class="h-full flex flex-col gap-6">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">App Blocker</h1>
            <p class="text-gray-500">Block distracting apps during focus time</p>
        </div>
        <button id="btn-mostrar-form" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm transition-colors">+ Add App</button>
    </div>

    <div id="form-add-app" class="hidden bg-gray-50 border border-gray-200 rounded-lg p-4">
        <h3 class="font-semibold text-gray-700 mb-3">Add custom app</h3>
        <div class="flex flex-col md:flex-row gap-3">
            <input id="input-nombre" type="text" placeholder="App name (e.g. WhatsApp)" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <input id="input-proceso" type="text" placeholder="Process name (e.g. WhatsApp.exe)" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <input id="input-ruta" type="text" placeholder="Full path (optional, for icon)" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button id="btn-guardar-app" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm transition-colors shrink-0">Save</button>
        </div>
    </div>

    <div class="flex items-center gap-4 flex-wrap">
        <input id="input-buscar" type="text" placeholder="Search apps..." class="flex-1 min-w-[200px] px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
        <span id="contador" class="text-sm text-gray-400"></span>
        <button id="btn-bloquear" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Block Selected</button>
        <button id="btn-desbloquear" class="px-6 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors">Unlock All</button>
    </div>

    <div class="flex items-center gap-2">
        <label class="text-gray-600 text-sm">Block duration:</label>
        <select id="select-tiempo" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="5">5 minutes</option>
            <option value="15">15 minutes</option>
            <option value="30" selected>30 minutes</option>
            <option value="60">1 hour</option>
            <option value="120">2 hours</option>
            <option value="240">4 hours</option>
        </select>
    </div>

    <div id="estado-bloqueo" class="hidden bg-yellow-100 border border-yellow-400 text-yellow-800 px-4 py-3 rounded-lg flex items-center justify-between">
        <span id="texto-estado"></span>
        <span class="font-mono font-bold" id="tiempo-restante"></span>
    </div>

    <div class="flex-1 overflow-y-auto border border-gray-200 rounded-lg">
        <div id="lista-apps" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 p-4">
        </div>
        <p id="sin-resultados" class="hidden text-gray-400 text-center py-8">No apps match your search</p>
    </div>
</div>

<script src="AppBlocker/appBlocker.js"></script>
