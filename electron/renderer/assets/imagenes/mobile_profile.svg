<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 420" width="220" height="420">
  <defs>
    <clipPath id="screen">
      <rect x="10" y="10" width="200" height="400" rx="22"/>
    </clipPath>
    <clipPath id="avatar">
      <circle cx="110" cy="148" r="24"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect x="2" y="2" width="216" height="416" rx="28" fill="#1a1a1a"/>
  <rect x="10" y="10" width="200" height="400" rx="22" fill="#ffffff"/>

  <!-- Status bar -->
  <text x="20" y="30" font-family="sans-serif" font-size="9" fill="#aaaaaa">9:41</text>
  <!-- wifi icon simplified -->
  <path d="M188 22 Q190 20 192 22" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M185 25 Q190 20 195 25" stroke="#aaa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="190" cy="28" r="1.5" fill="#aaa"/>
  <!-- battery -->
  <rect x="198" y="22" width="12" height="7" rx="1.5" fill="none" stroke="#aaa" stroke-width="1"/>
  <rect x="210" y="24" width="2" height="3" rx="0.5" fill="#aaa"/>
  <rect x="199" y="23" width="8" height="5" rx="0.5" fill="#aaa"/>

  <!-- Header row -->
  <circle cx="28" cy="50" r="13" fill="#f0f0f0"/>
  <text x="28" y="54" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">👤</text>
  <text x="110" y="54" font-family="sans-serif" font-size="11" font-weight="500" fill="#222" text-anchor="middle">Mi perfil</text>
  <!-- bell -->
  <path d="M192 44 Q192 40 196 40 Q200 40 200 44 L200 49 L192 49 Z" fill="#888"/>
  <path d="M191 49 L201 49" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M195 51 Q196 53 197 51" stroke="#888" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Profile card bg -->
  <rect x="18" y="65" width="184" height="85" rx="14" fill="#f0ebff"/>

  <!-- Avatar circle -->
  <circle cx="110" cy="100" r="24" fill="#9B8CE8"/>
  <!-- person icon in avatar -->
  <circle cx="110" cy="94" r="8" fill="#fff" opacity="0.9"/>
  <path d="M94 118 Q94 108 110 108 Q126 108 126 118" fill="#fff" opacity="0.9"/>

  <!-- Profile text -->
  <text x="110" y="128" font-family="sans-serif" font-size="11" font-weight="500" fill="#3C3489" text-anchor="middle">Sergio Luna</text>
  <text x="110" y="141" font-family="sans-serif" font-size="9" fill="#534AB7" text-anchor="middle">Full Stack Developer</text>

  <!-- Stats row -->
  <rect x="18" y="158" width="88" height="44" rx="10" fill="#f9f9f9"/>
  <text x="62" y="177" font-family="sans-serif" font-size="14" font-weight="500" fill="#222" text-anchor="middle">12</text>
  <text x="62" y="192" font-family="sans-serif" font-size="9" fill="#888" text-anchor="middle">Proyectos</text>

  <rect x="114" y="158" width="88" height="44" rx="10" fill="#f9f9f9"/>
  <text x="158" y="177" font-family="sans-serif" font-size="14" font-weight="500" fill="#222" text-anchor="middle">4 ★</text>
  <text x="158" y="192" font-family="sans-serif" font-size="9" fill="#888" text-anchor="middle">Valoración</text>

  <!-- Menu item 1 - Portfolio (highlighted) -->
  <rect x="18" y="212" width="184" height="34" rx="10" fill="#f0ebff"/>
  <rect x="28" y="221" width="16" height="16" rx="4" fill="#9B8CE8" opacity="0.3"/>
  <text x="36" y="232" font-family="sans-serif" font-size="11" fill="#534AB7" text-anchor="middle">&lt;/&gt;</text>
  <text x="55" y="232" font-family="sans-serif" font-size="11" fill="#3C3489">Portfolio</text>
  <text x="192" y="232" font-family="sans-serif" font-size="13" fill="#9B8CE8" text-anchor="end">›</text>

  <!-- Menu item 2 - Ajustes -->
  <rect x="18" y="254" width="184" height="34" rx="10" fill="#f9f9f9"/>
  <rect x="28" y="263" width="16" height="16" rx="4" fill="#e0e0e0"/>
  <text x="36" y="274" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">⚙</text>
  <text x="55" y="274" font-family="sans-serif" font-size="11" fill="#444">Ajustes</text>
  <text x="192" y="274" font-family="sans-serif" font-size="13" fill="#bbb" text-anchor="end">›</text>

  <!-- Menu item 3 - Cerrar sesión -->
  <rect x="18" y="296" width="184" height="34" rx="10" fill="#f9f9f9"/>
  <rect x="28" y="305" width="16" height="16" rx="4" fill="#e0e0e0"/>
  <text x="36" y="316" font-family="sans-serif" font-size="11" fill="#888" text-anchor="middle">↩</text>
  <text x="55" y="316" font-family="sans-serif" font-size="11" fill="#444">Cerrar sesión</text>
  <text x="192" y="316" font-family="sans-serif" font-size="13" fill="#bbb" text-anchor="end">›</text>

  <!-- Bottom nav divider -->
  <line x1="10" y1="348" x2="210" y2="348" stroke="#eeeeee" stroke-width="0.5"/>

  <!-- Bottom nav icons (text symbols as fallback) -->
  <text x="46" y="368" font-family="sans-serif" font-size="18" fill="#bbbbbb" text-anchor="middle">⌂</text>
  <text x="88" y="368" font-family="sans-serif" font-size="18" fill="#bbbbbb" text-anchor="middle">⌕</text>
  <text x="132" y="368" font-family="sans-serif" font-size="18" fill="#534AB7" text-anchor="middle">👤</text>
  <text x="174" y="368" font-family="sans-serif" font-size="18" fill="#bbbbbb" text-anchor="middle">♡</text>

  <!-- Home indicator -->
  <rect x="80" y="396" width="60" height="3" rx="2" fill="#cccccc"/>
</svg>
